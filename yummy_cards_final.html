<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yummy World Innovation - AR Vocabulary Cards</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f8ff; margin: 0; padding: 20px; }
        h1, h2 { text-align: center; color: #2c3e50; }
        
        /* สไตล์สำหรับการพิมพ์การ์ด */
        #print-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .card { 
            width: 300px; height: 450px; border: 3px solid #3498db; border-radius: 15px; 
            background-color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; align-items: center; justify-content: space-between; 
            padding: 20px; box-sizing: border-box; page-break-inside: avoid;
        }
        .card-title { font-size: 28px; font-weight: bold; color: #e67e22; margin: 0; }
        .card-taste { font-size: 18px; color: #7f8c8d; font-style: italic; }
        .qrcode-container { margin: 20px 0; }
        .card-footer { font-size: 14px; color: #bdc3c7; text-align: center; }
        
        /* สไตล์สำหรับหน้าแสดงผลเมื่อสแกน (Mobile) */
        #scan-result { 
            display: none; max-width: 600px; margin: 20px auto; padding: 20px; 
            background-color: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            text-align: center; 
        }
        #food-image { max-width: 100%; height: auto; border-radius: 10px; border: 5px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #food-name { font-size: 36px; color: #e67e22; margin: 10px 0; }
        #food-taste-display { font-size: 20px; color: #7f8c8d; margin-bottom: 10px; }
        #food-meaning { font-size: 22px; color: #2c3e50; margin: 15px 0; font-weight: bold; }
        #food-sentence { font-size: 18px; color: #34495e; background-color: #ecf0f1; padding: 15px; border-radius: 8px; font-style: italic; margin: 20px 0; line-height: 1.5; }
        
        .btn-speak { 
            background-color: #27ae60; color: white; border: none; padding: 12px 24px; 
            font-size: 18px; border-radius: 25px; cursor: pointer; margin: 10px; 
            transition: background-color 0.3s; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-speak:hover { background-color: #219150; }
        .btn-speak-sentence { background-color: #2980b9; }
        .btn-speak-sentence:hover { background-color: #2471a3; }
        
        #back-btn { margin-top: 30px; padding: 10px 20px; background-color: #95a5a6; color: white; text-decoration: none; border-radius: 5px; display: inline-block; }

        /* ส่วนควบคุมปุ่มพิมพ์ */
        #controls { text-align: center; margin-bottom: 20px; padding: 15px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        #print-btn { padding: 10px 25px; font-size: 18px; background-color: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #print-btn:hover { background-color: #c0392b; }

        /* ปรับปรุงสำหรับการพิมพ์ */
        @media print {
            body { background: white; padding: 0; }
            #controls, h1, #scan-result { display: none !important; }
            #print-area { display: flex !important; margin: 0; gap: 10px; }
            .card { box-shadow: none; border: 2px solid #ccc; page-break-inside: avoid; margin-bottom: 15px; }
        }
    </style>
</head>
<body>

    <h1>Yummy World Innovation: AR Vocabulary Cards</h1>

    <div id="controls">
        <p>1. แก้ไขชื่อไฟล์ HTML นี้เป็น <strong>yummy_cards_final.html</strong> และอัปโหลดขึ้น GitHub Repository ของคุณ (Food-Card2)</p>
        <p>2. เปิดใช้งาน GitHub Pages ใน Settings เพื่อให้ QR Code สแกนได้จริง</p>
        <button id="print-btn" onclick="window.print()">🖨️ Print vocabulary cards</button>
    </div>

    <div id="print-area"></div>

    <div id="scan-result">
        <img id="food-image" src="" alt="Food Image">
        <h2 id="food-name"></h2>
        <p id="food-taste-display"></p>
        <p id="food-meaning"></p>
        
        <button id="speak-btn" class="btn-speak">
            🔊 Listen to Food Name
        </button>

        <div id="food-sentence"></div>
        
        <button id="speak-sentence-btn" class="btn-speak btn-speak-sentence">
            🔊 Listen to Sentence
        </button>

        <br>
        <a href="#" id="back-btn" onclick="location.hash=''; location.reload(); return false;">Back to Cards</a>
    </div>

    <script>
        // --- ข้อมูลอาหาร (DATA) ---
        // พัฒนาต่อยอดจากไฟล์ Yummy world innovation โดยเพิ่มรูปภาพ ความหมาย และประโยค
        const FOODS = [
            { n: "Apple", t: "Sweet", th: "แอปเปิล (รสหวาน)", img: "https://images.unsplash.com/photo-1560806887-1e4cd0b6bccb?q=80&w=400&auto=format&fit=crop", sent: "This red apple is very sweet." },
            { n: "Orange", t: "Sour", th: "ส้ม (รสเปรี้ยว)", img: "https://images.unsplash.com/photo-1582979512210-99b6a53386f9?q=80&w=400&auto=format&fit=crop", sent: "I like to drink sour orange juice." },
            { n: "Cake", t: "Sweet", th: "เค้ก (รสหวาน)", img: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?q=80&w=400&auto=format&fit=crop", sent: "We have a big cake for your birthday." },
            { n: "Candy", t: "Sweet", th: "ลูกอม (รสหวาน)", img: "https://images.unsplash.com/photo-1581798459219-318e76aecc7b?q=80&w=400&auto=format&fit=crop", sent: "Don't eat too much sweet candy." },
            { n: "Lemon", t: "Sour", th: "เลมอน (รสเปรี้ยว)", img: "https://images.unsplash.com/photo-1590502572837-142f77e48710?q=80&w=400&auto=format&fit=crop", sent: "A lemon is very sour." },
            { n: "Sai Ua", t: "Spicy", th: "ไส้อั่ว (รสเผ็ด)", img: "https://vj-ist.com/cdn/shop/files/SaiUaChiangMai_1024x1024.jpg?v=1710574768", sent: "Sai Ua is a spicy sausage from Northern Thailand." },
            { n: "Khao Soi", t: "Spicy", th: "ข้าวซอย (รสเผ็ด)", img: "https://www.thairath.co.th/media/dG9pbmN4dW5mYjI5bDRoT25mYjIxbXU5ZFRiN2NKb05ST1U5ejBvUGNxRHQ3SFEzSDgzazhWdWdOM0I4.jpg", sent: "Khao Soi is a yummy spicy curry noodle soup." },
            { n: "Potato Chips", t: "Salty", th: "มันฝรั่งทอด (รสเค็ม)", img: "https://images.unsplash.com/photo-1566478989037-eec170784d0b?q=80&w=400&auto=format&fit=crop", sent: "These potato chips are too salty." }
        ];

        // --- ตั้งค่า URL สำหรับ QR Code (สำคัญมากสำหรับการเชื่อมโยงสื่อ) ---
        // เปลี่ยนเป็น URL ของ GitHub Pages ของคุณ
        // โครงสร้าง: https://[username].github.io/[repository-name]/[filename].html
        var baseUrl = "https://roongnapaprompan-star.github.io/Food-Card2/yummy_cards_final.html";

        // --- ฟังก์ชันสร้างการ์ดคำศัพท์ (BUILD CARDS) ---
        function buildCards() {
            var printArea = document.getElementById('print-area');
            
            FOODS.forEach((food, index) => {
                // 1. สร้างโครงสร้างการ์ด
                var card = document.createElement('div');
                card.className = 'card';
                
                var title = document.createElement('p');
                title.className = 'card-title';
                title.innerText = food.n;
                
                var taste = document.createElement('p');
                taste.className = 'card-taste';
                taste.innerText = `(${food.t})`;

                // 2. สร้างพื้นที่สำหรับ QR Code
                var qrContainer = document.createElement('div');
                qrContainer.className = 'qrcode-container';
                var qrId = 'qrcode-' + index;
                qrContainer.id = qrId;

                var footer = document.createElement('p');
                footer.className = 'card-footer';
                footer.innerText = "Scan to see real food, meaning, and sentence!";

                // Assembly card
                card.appendChild(title);
                card.appendChild(taste);
                card.appendChild(qrContainer);
                card.appendChild(footer);
                printArea.appendChild(card);

                // 3. สร้าง QR Code จริงที่เชื่อมโยงไปยังหน้านี้พร้อม Parameter #card=...
                var finalUrl = baseUrl + "#card=" + encodeURIComponent(food.n);
                
                new QRCode(document.getElementById(qrId), {
                    text: finalUrl,
                    width: 150,
                    height: 150,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H // ปรับระดับความปลอดภัยสูงเพื่อให้สแกนง่าย
                });
            });
        }

        // --- ฟังก์ชันเสียง (SPEECH) ---
        function speak(text) {
            if ('speechSynthesis' in window) {
                // ยกเลิกเสียงที่กำลังพูดอยู่ก่อนหน้า
                window.speechSynthesis.cancel();
                var msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'en-US'; // ตั้งเป็นภาษาอังกฤษ
                msg.rate = 0.9;     // ช้าลงเล็กน้อยเพื่อให้เด็กฟังทัน
                window.speechSynthesis.speak(msg);
            } else {
                alert("Sorry, your device doesn't support speech.");
            }
        }

        // --- ฟังก์ชันจัดการเมื่อมีการสแกน (HANDLE SCAN) ---
        function handleScanResult() {
            var hash = location.hash;
            
            // ถ้าไม่มี Hash แสดงว่าเป็นหน้าพิมพ์การ์ดปกติ
            if (!hash || !hash.startsWith('#card=')) {
                document.getElementById('controls').style.display = 'block';
                document.getElementById('print-area').style.display = 'flex';
                document.getElementById('scan-result').style.display = 'none';
                return;
            }

            // ถ้ามี Hash แสดงว่านักเรียนสแกนมา
            var foodName = decodeURIComponent(hash.substring(6));
            var foodData = FOODS.find(f => f.n === foodName);

            if (foodData) {
                // ซ่อนส่วนพิมพ์ แสดงส่วนผลลัพธ์
                document.getElementById('controls').style.display = 'none';
                document.getElementById('print-area').style.display = 'none';
                document.getElementById('scan-result').style.display = 'block';
                document.title = "Yummy! - " + foodData.n;

                // อัปเดตข้อมูลบนหน้าจอ
                document.getElementById('food-image').src = foodData.img;
                document.getElementById('food-name').innerText = foodData.n;
                document.getElementById('food-taste-display').innerText = `Taste: ${foodData.t}`;
                document.getElementById('food-meaning').innerText = `ความหมาย: ${foodData.th}`;
                document.getElementById('food-sentence').innerText = `"${foodData.sent}"`;

                // ตั้งค่าปุ่มเสียง
                document.getElementById('speak-btn').onclick = function() { speak(foodData.n); };
                document.getElementById('speak-sentence-btn').onclick = function() { speak(foodData.sent); };
            }
        }

        // --- เริ่มทำงาน (INITIALIZE) ---
        // ตรวจสอบทันทีเมื่อโหลดหน้าเว็บ หรือมีการเปลี่ยนแปลง Hash (เช่นเมื่อสแกนใหม่)
        window.addEventListener('load', buildCards);
        window.addEventListener('load', handleScanResult);
        window.addEventListener('hashchange', handleScanResult);

    </script>
</body>
</html>
